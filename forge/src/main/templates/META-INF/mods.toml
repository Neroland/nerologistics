modLoader = "javafml"
loaderVersion = "${forge_loader_version_range}"
license = "${mod_license}"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
authors = "${mod_authors}"
description = '''
NeroLogistics - multiloader build (Forge).
'''

[[mixins]]
config = "nerologistics-common.mixins.json"

[[dependencies.${mod_id}]]
modId = "forge"
mandatory = true
versionRange = "${forge_loader_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "minecraft"
mandatory = true
versionRange = "${minecraft_version_range}"
ordering = "NONE"
side = "BOTH"

# Neroland Core — required shared foundation; must load BEFORE NeroLogistics (ordering = AFTER).
[[dependencies.${mod_id}]]
modId = "nerolandcore"
mandatory = true
versionRange = "[1.0,2.0)"
ordering = "AFTER"
side = "BOTH"

# Nerospace — optional. When present it must load BEFORE NeroLogistics so its planet/station API and
# rocket cargo routes are available; discovery is via Core tags/capabilities, never a hard import.
[[dependencies.${mod_id}]]
modId = "nerospace"
mandatory = false
versionRange = "[0,)"
ordering = "AFTER"
side = "BOTH"

# Nerotech — optional. When present it must load BEFORE NeroLogistics so its automation handoff surface
# (auto crafters / item sorters) is available; discovery is via Core tags/capabilities only.
[[dependencies.${mod_id}]]
modId = "nerotech"
mandatory = false
versionRange = "[0,)"
ordering = "AFTER"
side = "BOTH"
